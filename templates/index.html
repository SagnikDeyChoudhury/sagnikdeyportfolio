<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Hi, I'm Sagnik Dey Choudhury</h1>
        <p>BCA Student - 1st Year</p>
    </header>

    <main>
        <section class="about-card">
            <h2>About Me</h2>
            <p>Hello! I'm a first-year BCA student passionate about web development and programming. This is my simple portfolio to showcase my work and let you connect with me.</p>
        </section>

        <section class="contact-card">
            <h2>Contact Me</h2>
            <form id="contactForm">
                <input type="text" id="name" placeholder="Your Name" required>
                <input type="email" id="email" placeholder="Your Email" required>
                <textarea id="message" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
            <p id="response"></p>
        </section>
    </main>

    <footer>
        <p>© 2026 Sagnik Dey Choudhury. All Rights Reserved.</p>
    </footer>

    <script src="/static/script.js"></script>
</body>
</html>
